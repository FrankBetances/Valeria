name: Android Build

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main
      - claude/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Evita el build duplicado: los push a ramas del propio repo ya compilan por
    # el evento `push`; el evento `pull_request` solo aporta valor para forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository

    env:
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Gradle descarga el NDK en mitad del build y esa descarga a veces llega
      # corrupta ("Archive is not a ZIP archive"). Instalarlo aquí con
      # reintentos elimina ese punto de fallo intermitente.
      # La versión debe coincidir con la que pide React Native (0.81 → NDK 27,
      # ver node_modules/react-native/ReactAndroid/gradle.properties).
      - name: Install Android NDK 27.1.12297006 (with retries)
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          ok=0
          for i in 1 2 3; do
            if echo y | "$SDKMANAGER" --install "ndk;27.1.12297006"; then
              echo "NDK instalado en el intento $i"
              ok=1
              break
            fi
            echo "Descarga del NDK fallida (intento $i); limpiando restos y reintentando…"
            rm -rf "$ANDROID_HOME/ndk/27.1.12297006"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "No se pudo instalar el NDK tras 3 intentos"
            exit 1
          fi

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./android/gradlew

      - name: Decode release keystore
        if: env.HAS_SIGNING_SECRETS == 'true'
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Add release signingConfig to build.gradle
        if: env.HAS_SIGNING_SECRETS == 'true'
        run: |
          python3 - <<'PY'
          path = "android/app/build.gradle"
          with open(path) as f:
              content = f.read()

          release_signing_config = """        release {
              storeFile file("release.keystore")
              storePassword System.getenv("RELEASE_STORE_PASSWORD")
              keyAlias System.getenv("RELEASE_KEY_ALIAS")
              keyPassword System.getenv("RELEASE_KEY_PASSWORD")
          }
          """
          content = content.replace(
              "    signingConfigs {\n        debug {",
              "    signingConfigs {\n" + release_signing_config + "        debug {",
              1,
          )

          old_release_block = (
              "        release {\n"
              "            // Caution! In production, you need to generate your own keystore file.\n"
              "            // see https://reactnative.dev/docs/signed-apk-android.\n"
              "            signingConfig signingConfigs.debug\n"
          )
          new_release_block = (
              "        release {\n"
              "            signingConfig signingConfigs.release\n"
          )
          assert old_release_block in content, "release buildType block not found - build.gradle template may have changed"
          content = content.replace(old_release_block, new_release_block, 1)

          with open(path, "w") as f:
              f.write(content)
          PY

      - name: Build signed release APK
        if: env.HAS_SIGNING_SECRETS == 'true'
        working-directory: ./android
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build debug APK (no signing secrets configured)
        if: env.HAS_SIGNING_SECRETS != 'true'
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/**/*.apk
