name: Android Build

# Firma de release: requiere estos secrets en Settings > Secrets and variables > Actions:
#   ANDROID_RELEASE_KEYSTORE_BASE64  → keystore codificado (base64 -w0 release.keystore)
#   ANDROID_RELEASE_STORE_PASSWORD   → contraseña del keystore
#   ANDROID_RELEASE_KEY_ALIAS        → alias de la clave
#   ANDROID_RELEASE_KEY_PASSWORD     → contraseña de la clave
# Con los secrets configurados, cada push/fusión a main genera el APK y el AAB
# (Android App Bundle) firmados; en el resto de ramas solo se compila el APK.
#
# Config de Firebase: la app lee variables EXPO_PUBLIC_FIREBASE_* en tiempo de
# build (Metro las inyecta al empaquetar el JS durante el build de Gradle).
# Añade también estos secrets para que los builds de CI salgan con Firebase
# configurado (sin ellos la app compila igual, pero avisa de config incompleta):
#   EXPO_PUBLIC_FIREBASE_API_KEY  → apiKey del SDK web (apps:sdkconfig)
#   EXPO_PUBLIC_FIREBASE_APP_ID   → appId de la app Android (apps:sdkconfig)

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main
      - claude/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Evita el build duplicado: los push a ramas del propio repo ya compilan por
    # el evento `push`; el evento `pull_request` solo aporta valor para forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository

    env:
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
      # Firebase (ver cabecera). projectId y sender id son públicos; la apiKey
      # y el appId salen de secrets para no dejarlos escritos en el repo.
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: valeria-b500f
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '477839657795'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # El APK compila igual sin estos secrets, pero sale sin acceso a Firebase
      # (la app arranca y avisa de config incompleta en Acceso Profesional).
      # El warning lo deja visible en el resumen del run para no descubrirlo
      # ya con el APK instalado en el dispositivo.
      - name: Avisar si faltan los secrets de Firebase
        run: |
          if [ -z "$EXPO_PUBLIC_FIREBASE_API_KEY" ] || [ -z "$EXPO_PUBLIC_FIREBASE_APP_ID" ]; then
            echo "::warning title=Firebase sin configurar::Faltan los secrets EXPO_PUBLIC_FIREBASE_API_KEY / EXPO_PUBLIC_FIREBASE_APP_ID; este APK saldrá sin acceso a Firebase (ver docs/firebase-setup.md)."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Gradle descarga el NDK en mitad del build y esa descarga a veces llega
      # corrupta ("Archive is not a ZIP archive"). Instalarlo aquí con
      # reintentos elimina ese punto de fallo intermitente.
      # La versión debe coincidir con la que pide React Native (0.81 → NDK 27,
      # ver node_modules/react-native/ReactAndroid/gradle.properties).
      - name: Install Android NDK 27.1.12297006 (with retries)
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          ok=0
          for i in 1 2 3; do
            if echo y | "$SDKMANAGER" --install "ndk;27.1.12297006"; then
              echo "NDK instalado en el intento $i"
              ok=1
              break
            fi
            echo "Descarga del NDK fallida (intento $i); limpiando restos y reintentando…"
            rm -rf "$ANDROID_HOME/ndk/27.1.12297006"
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "No se pudo instalar el NDK tras 3 intentos"
            exit 1
          fi

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      # Play Console exige que cada subida tenga un versionCode mayor que la
      # anterior. El prebuild lo genera fijo en 1, así que lo derivamos del
      # número de run del workflow, que GitHub incrementa en cada ejecución.
      - name: Set versionCode from workflow run number
        run: |
          sed -i "s/versionCode 1\b/versionCode ${{ github.run_number }}/" android/app/build.gradle
          if ! grep -q "versionCode ${{ github.run_number }}" android/app/build.gradle; then
            echo "No se encontró 'versionCode 1' en build.gradle; la plantilla del prebuild puede haber cambiado"
            exit 1
          fi
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./android/gradlew

      - name: Decode release keystore
        if: env.HAS_SIGNING_SECRETS == 'true'
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Add release signingConfig to build.gradle
        if: env.HAS_SIGNING_SECRETS == 'true'
        run: |
          python3 - <<'PY'
          path = "android/app/build.gradle"
          with open(path) as f:
              content = f.read()

          release_signing_config = """        release {
              storeFile file("release.keystore")
              storePassword System.getenv("RELEASE_STORE_PASSWORD")
              keyAlias System.getenv("RELEASE_KEY_ALIAS")
              keyPassword System.getenv("RELEASE_KEY_PASSWORD")
          }
          """
          content = content.replace(
              "    signingConfigs {\n        debug {",
              "    signingConfigs {\n" + release_signing_config + "        debug {",
              1,
          )

          old_release_block = (
              "        release {\n"
              "            // Caution! In production, you need to generate your own keystore file.\n"
              "            // see https://reactnative.dev/docs/signed-apk-android.\n"
              "            signingConfig signingConfigs.debug\n"
          )
          new_release_block = (
              "        release {\n"
              "            signingConfig signingConfigs.release\n"
          )
          assert old_release_block in content, "release buildType block not found - build.gradle template may have changed"
          content = content.replace(old_release_block, new_release_block, 1)

          with open(path, "w") as f:
              f.write(content)
          PY

      - name: Build signed release APK
        if: env.HAS_SIGNING_SECRETS == 'true'
        working-directory: ./android
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # El AAB es el formato que exige Google Play. Solo se genera en main (cada
      # fusión) o al lanzar el workflow a mano, para no alargar los builds de PR.
      - name: Build signed release AAB
        if: env.HAS_SIGNING_SECRETS == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        working-directory: ./android
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB
        if: env.HAS_SIGNING_SECRETS == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Build debug APK (no signing secrets configured)
        if: env.HAS_SIGNING_SECRETS != 'true'
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android/app/build/outputs/apk/**/*.apk
