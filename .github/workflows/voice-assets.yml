name: Generate Voice Assets

# Tubería de Fase 2 del plan ILENIA/Nós: sintetiza el corpus de voz con la voz
# neuronal configurada (scripts/generate-voice-assets.py), masteriza, regenera
# el mapa valeriaVoiceAssets.ts y COMMITEA los assets a la rama desde la que
# se lanzó. Se ejecuta a mano (workflow_dispatch) cuando cambia el corpus o la
# voz; el push resultante dispara el build Android normal, que empaqueta el
# audio en el APK. Los modelos solo corren aquí: jamás en el dispositivo.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: 'Idioma del corpus a sintetizar (es · gl · eu)'
        required: false
        default: 'es'
  # Disparo automático cuando cambia la propia tubería o el corpus en ramas de
  # trabajo (la integración de esta sesión no puede lanzar workflow_dispatch).
  push:
    # Solo ramas de trabajo: main está protegida (PR + status check "build"), así
    # que el bot NO puede commitear los assets ahí. La síntesis corre en una rama
    # claude/** y los assets se integran a main por PR o push de admin.
    branches:
      - claude/**
    paths:
      - voice-corpus.json
      - scripts/generate-voice-assets.py
      - scripts/build-voice-asset-map.js
      - scripts/export-voice-corpus.js
      - .github/workflows/voice-assets.yml

permissions:
  contents: write

jobs:
  synthesize:
    runs-on: ubuntu-latest
    # Anti-bucle: el commit de assets que hace este workflow también toca
    # voice-corpus.json; no debe relanzarse a sí mismo.
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export voice corpus
        run: node scripts/export-voice-corpus.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install piper-tts
        run: pip install piper-tts

      # Las imágenes actuales de ubuntu-latest ya no traen ffmpeg de serie.
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      # Incremental: cada idioma sintetiza SOLO las locuciones sin asset.
      - name: Synthesize es (Sharvard · piper)
        run: python3 scripts/generate-voice-assets.py --lang es

      # coqui-tts (torch CPU, ~2 GB) solo se instala si faltan assets gl.
      - name: Check missing gl assets
        id: glcheck
        run: |
          MISSING=$(python3 - <<'PY'
          import json, pathlib
          corpus = json.load(open('voice-corpus.json'))['corpus']
          out = pathlib.Path('assets/voice')
          print(sum(1 for e in corpus if e.get('lang') == 'gl' and not (out / f"{e['id']}.m4a").exists()))
          PY
          )
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
          echo "Locuciones gl sin asset: $MISSING"

      # coqui-tts no arrastra torch (lo declara opcional): se instalan las
      # ruedas CPU explícitamente (sin CUDA, mucho más ligeras).
      - name: Install coqui-tts (Celtia)
        if: steps.glcheck.outputs.missing != '0'
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          # transformers 5.x eliminó isin_mps_friendly, que coqui aún importa.
          pip install coqui-tts "transformers<4.50"

      # HF_TOKEN (secret): los modelos de proxectonos son "gated" en Hugging
      # Face — exige aceptar sus condiciones con una cuenta y token de lectura.
      # (Secret HF_TOKEN configurado; se relanza la síntesis de Celtia.)
      - name: Synthesize gl (Celtia · Proxecto Nós)
        if: steps.glcheck.outputs.missing != '0'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 scripts/generate-voice-assets.py --lang gl

      # euskera (HiTZ-TTS · ILENIA/NEL-GAITU): VITS de grafemas en ONNX
      # (vits.onnx + config.json). Se infiere con onnxruntime, sin torch/coqui.
      - name: Check missing eu assets
        id: eucheck
        run: |
          MISSING=$(python3 - <<'PY'
          import json, pathlib
          corpus = json.load(open('voice-corpus.json'))['corpus']
          out = pathlib.Path('assets/voice')
          print(sum(1 for e in corpus if e.get('lang') == 'eu' and not (out / f"{e['id']}.m4a").exists()))
          PY
          )
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
          echo "Locuciones eu sin asset: $MISSING"

      # AhoTTS trae el binario `tts` + diccionarios vascos (eu_dicc); el vits.onnx
      # se descarga de HF con huggingface_hub. La voz vasca se sintetiza a través
      # de ese binario (frontend lingüístico + G2P), no con el ONNX suelto.
      - name: Set up AhoTTS (HiTZ euskera)
        if: steps.eucheck.outputs.missing != '0'
        run: |
          git clone --depth 1 https://github.com/hitz-zentroa/aHoTTS.git "$RUNNER_TEMP/ahotts"
          chmod +x "$RUNNER_TEMP/ahotts/ahotts/tts" || true
          pip install huggingface_hub
          echo "AHOTTS_DIR=$RUNNER_TEMP/ahotts" >> "$GITHUB_ENV"

      # NO bloqueante: si AhoTTS falla (libs del binario, descarga del modelo),
      # el resto del pipeline sigue y el euskera degrada a la voz del sistema
      # eu-ES; el log (ldd, diagnóstico) revela la causa para iterar.
      - name: Synthesize eu (AhoTTS · HiTZ/Aholab)
        if: steps.eucheck.outputs.missing != '0'
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 scripts/generate-voice-assets.py --lang eu

      - name: Rebuild asset map
        run: node scripts/build-voice-asset-map.js

      - name: Commit assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/voice src/valeriaVoiceAssets.ts voice-corpus.json voice-assets-manifest.*.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los assets de voz."
            exit 0
          fi
          git commit \
            -m "Voz ILENIA/Nós · Fase 2: assets de voz neuronal generados en CI" \
            -m "Lote sintetizado por el workflow voice-assets (ver voice-assets-manifest.json: voz, duración y peso por locución). Mapa valeriaVoiceAssets.ts regenerado."
          # Empuje robusto ante pushes concurrentes: si la rama avanzó mientras
          # sintetizábamos, rebasar (los assets son ficheros nuevos, sin conflicto)
          # y reintentar. Evita el "! [rejected] (fetch first)" que perdía el lote.
          for i in 1 2 3; do
            git push && break
            echo "push rechazado (intento $i); rebase y reintento…"
            git pull --rebase origin "${{ github.ref_name }}" || exit 1
          done
