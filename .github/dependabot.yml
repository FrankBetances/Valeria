# Dependabot · Valeria+
# ---------------------------------------------------------------------------
# ⚠️ IMPORTANTE — LECCIÓN APRENDIDA
# Este es un proyecto Expo (SDK 54). Los paquetes `expo`, `expo-*`, `react`,
# `react-native`, `react-native-*`, `@types/react` y `typescript` están
# ATADOS a la versión del SDK: solo deben moverse TODOS JUNTOS, mediante
# `npx expo install --fix` o una actualización de SDK. Dejar que Dependabot
# los suba sueltos ROMPE el build (paquetes saltando a versiones de otro SDK).
#
# Por eso NO habilitamos "version updates" para el ecosistema npm. Las
# dependencias de la app se gestionan a mano con:
#     npx expo install --fix          (alinea todo con el SDK instalado)
#     npx expo install exp<paquete>   (añadir uno nuevo compatible)
#
# Las vulnerabilidades de seguridad siguen cubiertas por "Dependabot security
# updates" (Settings → Security), que solo abre PR ante una alerta real y que
# se revisa MANUALMENTE antes de fusionar — nunca en automático.
#
# Aquí solo mantenemos actualizadas las GitHub Actions, y únicamente en
# minor/patch (ignoramos los "major" para evitar saltos de versión que
# rompan el CI, como el checkout@v4→v7 que hubo que revertir).
# ---------------------------------------------------------------------------
version: 2
updates:
  # --- GitHub Actions (solo minor/patch) ----------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "06:00"
      timezone: America/Santo_Domingo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    ignore:
      # Nunca "major" automáticamente: cambian de comportamiento y rompen CI.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # NOTA: el ecosistema `npm` se omite a propósito (ver cabecera). No añadir
  # aquí `package-ecosystem: npm` para "version updates": las dependencias
  # Expo se alinean con `expo install --fix`, no con bumps sueltos.
